<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Jawab Tugas Akhir</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.comment-box {
    background: white;
    border-radius: 10px;
    padding: 15px 20px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    line-height: 1.7;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
    <h1>Tanya Jawab Tugas Akhir</h1>
    <div id="comments"></div>
</div>

<script>
const sheetURL = 'https://docs.google.com/spreadsheets/d/1jaO6kwbXqLBFzHAI9KphFX95Pxdsrgxybdg48oLhAmM/export?format=csv';

async function loadComments() {
    const response = await fetch(sheetURL);
    const data = await response.text();

    const rows = data.trim().split('\n').slice(1);

    let html = '';

    rows.reverse().forEach(row => {
        // hanya ambil kolom A
        const firstCell = row.split(',')[0].replace(/^"|"$/g, '');

        if (firstCell.trim()) {
            html += `
                <div class="comment-box">
                    ${firstCell}
                </div>
            `;
        }
    });

    document.getElementById('comments').innerHTML = html;
}

loadComments();
setInterval(loadComments, 10000);
</script>

</body>
</html>
