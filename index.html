<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Jawab Tugas Akhir (Genap 2025/2026)</title>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #ffffff;
        margin: 0;
        padding: 30px;
    }

    .container {
        max-width: 800px;
        margin: auto;
    }

    h1 {
        text-align: center;
        margin-bottom: 40px;
        color: #000;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* GAYA BARU: KUNING, TEKS HITAM, OUTLINE HITAM, TANPA SHADOW */
    .comment-box {
        background: #fff000; /* Warna kuning solid */
        color: #000;         /* Teks hitam pekat */
        border: 2px solid #000; /* Outline garis hitam tegas */
        border-radius: 0px;  /* Sudut tajam untuk kesan analitis/teknis */
        padding: 20px;
        margin-bottom: 20px;
        line-height: 1.7;
        white-space: pre-line;
        box-shadow: none;    /* Menghapus bayangan */
        transition: background 0.2s ease;
    }

    .comment-box:hover {
        background: #ffe600; /* Sedikit perubahan warna saat hover tanpa efek bayangan */
    }
</style>
</head>

<body>

<div class="container">
    <h1>Tanya Jawab Tugas Akhir (Genap 2025/2026)</h1>
    <div id="comments"></div>
</div>

<script>
const sheetURL = 'https://docs.google.com/spreadsheets/d/1jaO6kwbXqLBFzHAI9KphFX95Pxdsrgxybdg48oLhAmM/export?format=csv';

// Fungsi parser CSV untuk menangani kutipan ganda dan baris baru dalam sel
function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = '';
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
            cell += '"';
            i++;
        } else if (char === '"') {
            insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
            row.push(cell);
            cell = '';
        } else if (char === '\n' && !insideQuotes) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
        } else {
            cell += char;
        }
    }

    if (cell || row.length > 0) {
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

async function loadComments() {
    try {
        // Menambahkan cache buster agar data selalu terbaru
        const response = await fetch(`${sheetURL}&t=${new Date().getTime()}`);
        const csvText = await response.text();

        // Mengambil baris data dan melewati header
        const allRows = parseCSV(csvText);
        const dataRows = allRows.slice(1);

        let html = '';

        // Memproses dari baris paling bawah (terbaru)
        dataRows.reverse().forEach(row => {
            // HANYA mengambil kolom A (indeks 0)
            const firstCell = row[0]?.trim();

            if (firstCell) {
                html += `
                    <div class="comment-box">
                        ${firstCell}
                    </div>
                `;
            }
        });

        document.getElementById('comments').innerHTML = html || '<p style="text-align:center;">Tidak ada data ditemukan di kolom A.</p>';

    } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('comments').innerHTML = '<p style="text-align:center; color:red;">Gagal memuat data. Periksa koneksi atau izin sharing spreadsheet.</p>';
    }
}

loadComments();
// Refresh data setiap 10 detik
setInterval(loadComments, 10000);
</script>

</body>
</html>
