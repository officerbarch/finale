<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
    color: #000;
    text-transform: uppercase;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
}

/* CARD */
.comment-box {
    background: #FFFFE0;
    border: 2px solid #000;
    border-radius: 8px;
    padding: 12px;
    line-height: 1.5;
    transition: transform 0.2s ease;
}

.comment-box:hover {
    transform: translateY(-4px);
    background: #FAFAD2;
}

.comment-text {
    white-space: pre-line;
}

.comment-box img {
    width: 100%;
    margin-top: 10px;
    border-radius: 6px;
}

.section-title {
    margin-top: 40px;
    margin-bottom: 10px;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="container">
    <h1>HVAC</h1>
    <div id="comments"></div>
</div>

<script>
const sheetURL = 'https://docs.google.com/spreadsheets/d/1jaO6kwbXqLBFzHAI9KphFX95Pxdsrgxybdg48oLhAmM/export?format=csv';

// CSV parser aman
function parseCSV(text) {
    const rows = [];
    let row = [], cell = '', insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
            cell += '"'; i++;
        } else if (char === '"') {
            insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
            row.push(cell); cell = '';
        } else if (char === '\n' && !insideQuotes) {
            row.push(cell); rows.push(row);
            row = []; cell = '';
        } else {
            cell += char;
        }
    }

    if (cell || row.length) {
        row.push(cell); rows.push(row);
    }

    return rows;
}

// convert drive link → image (lebih stabil)
function convertDriveLink(url) {
    const match = url.match(/\/d\/(.*?)\//);
    if (match) {
        return `https://lh3.googleusercontent.com/d/${match[1]}`;
    }
    return url;
}

// cari link gambar di seluruh row
function findImage(row) {
    for (let cell of row) {
        if (cell && cell.includes('http')) {
            return cell;
        }
    }
    return null;
}

// cluster waktu
function getDateGroup(dateStr) {
    const now = new Date();
    const d = new Date(dateStr);

    if (isNaN(d)) return "Sebelumnya";

    const diff = (now - d) / (1000 * 60 * 60 * 24);

    if (diff < 1) return "Hari ini";
    if (diff < 2) return "Kemarin";
    return "Sebelumnya";
}

async function loadComments() {
    try {
        const response = await fetch(`${sheetURL}&t=${Date.now()}`);
        const text = await response.text();

        const rows = parseCSV(text).slice(1);

        const groups = {
            "Hari ini": [],
            "Kemarin": [],
            "Sebelumnya": []
        };

        rows.forEach(row => {
            const time = row[0];
            const content = row[1];

            let image = findImage(row);

            if (!content && !image) return;

            let imgHTML = '';

            if (image && image.startsWith('http')) {
                image = convertDriveLink(image);
                imgHTML = `<img src="${image}" onerror="this.style.display='none'">`;
            }

            const card = `
                <div class="comment-box">
                    <div class="comment-text">${content || ''}</div>
                    ${imgHTML}
                </div>
            `;

            const group = getDateGroup(time);
            groups[group].push(card);
        });

        let html = '';

        Object.keys(groups).forEach(group => {
            if (groups[group].length > 0) {
                html += `
                    <div class="section-title">${group}</div>
                    <div class="grid">
                        ${groups[group].join('')}
                    </div>
                `;
            }
        });

        document.getElementById('comments').innerHTML = html;

    } catch (error) {
        console.error(error);
        document.getElementById('comments').innerHTML = 'Gagal load data';
    }
}

loadComments();
setInterval(loadComments, 10000);
</script>

</body>
</html>
