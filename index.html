<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: left;
    margin-bottom: 40px;
    text-transform: proper-case;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
}

/* CARD */
.comment-box {
    background: #FFFFE0;
    border: 1px solid #000;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
}

/* TEXT */
.comment-text {
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 8; /* 🔥 jumlah baris preview */
    -webkit-box-orient: vertical;
    white-space: pre-line;
}

/* EXPANDED TEXT */
.comment-box.expanded .comment-text {
    -webkit-line-clamp: unset;
}

/* IMAGE */
.comment-box img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    margin-top: 10px;
    border-radius: 6px;
}

/* BUTTON */
.read-more {
    margin-top: 8px;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
}

/* SECTION */
.section-title {
    margin-top: 40px;
    margin-bottom: 10px;
    font-weight: 500;
}

/* MOBILE */
@media (max-width: 600px) {
    .comment-box img {
        height: auto;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1> H.V.A.C - Healing Via Anonymous Confession</h1>
    <h2 style="font-size: 18px; font-style: italic; font-weight: normal; opacity: 0.9;">
Modern Problems Require Postmodern Solutions
</h2>
    <div id="comments"></div>
</div>

<script>
const sheetURL = 'https://docs.google.com/spreadsheets/d/1jaO6kwbXqLBFzHAI9KphFX95Pxdsrgxybdg48oLhAmM/export?format=csv';

function parseCSV(text) {
    const rows = [];
    let row = [], cell = '', insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
            cell += '"'; i++;
        } else if (char === '"') {
            insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
            row.push(cell); cell = '';
        } else if (char === '\n' && !insideQuotes) {
            row.push(cell); rows.push(row);
            row = []; cell = '';
        } else {
            cell += char;
        }
    }

    if (cell || row.length) {
        row.push(cell); rows.push(row);
    }

    return rows;
}

function convertDriveLink(url) {
    const match = url.match(/\/d\/(.*?)\//);
    return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
}

function findImage(row) {
    for (let cell of row) {
        if (cell && cell.includes('http')) return cell;
    }
    return null;
}

function getDateGroup(dateStr) {
    const now = new Date();
    const d = new Date(dateStr);
    if (isNaN(d)) return "Sebelumnya";

    const diff = (now - d) / (1000 * 60 * 60 * 24);

    if (diff < 1) return "Hari ini";
    if (diff < 2) return "Kemarin";
    return "Sebelumnya";
}

function toggleExpand(el) {
    el.closest('.comment-box').classList.toggle('expanded');
}

async function loadComments() {
    const response = await fetch(`${sheetURL}&t=${Date.now()}`);
    const text = await response.text();

    const rows = parseCSV(text).slice(1);

    const groups = {
        "Hari ini": [],
        "Kemarin": [],
        "Sebelumnya": []
    };

    rows.forEach(row => {
        const time = row[0];
        const content = row[1];

        let image = findImage(row);

        if (!content && !image) return;

        let imgHTML = '';
        if (image && image.startsWith('http')) {
            image = convertDriveLink(image);
            imgHTML = `<img src="${image}" onerror="this.style.display='none'">`;
        }

        const card = `
            <div class="comment-box">
                <div class="comment-text">${content || ''}</div>
                ${imgHTML}
                <div class="read-more" onclick="toggleExpand(this)"> lihat+ </div>
            </div>
        `;

        const group = getDateGroup(time);
        groups[group].push(card);
    });

    let html = '';

    Object.keys(groups).forEach(group => {
        if (groups[group].length > 0) {
            html += `
                <div class="section-title">${group}</div>
                <div class="grid">
                    ${groups[group].join('')}
                </div>
            `;
        }
    });

    document.getElementById('comments').innerHTML = html;
}

loadComments();
setInterval(loadComments, 10000);
</script>
<div style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #ffffff;
    text-align: left;
    padding: 10px;
    font-size: 10px;
    border-top: 0px solid #ddd;
    z-index: 1000;
">
    Koordinator TA | Arsitektur F-TSPK ITS | 2026
</div>
</body>
</html>
